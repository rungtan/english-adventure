<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#FF6B9D">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>English Adventure</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&family=Baloo+2:wght@400;600;700;800&family=Patrick+Hand&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--pink:#FF6B9D;--purple:#C44DFF;--deep-purple:#6C5CE7;--violet:#A78BFA;--teal:#4ECDC4;--amber:#F59E0B;--rose:#EC4899;--cyan:#06B6D4;--green:#10B981;--red:#EF4444;--sky:#38BDF8;--orange:#F97316;--lime:#84CC16;--text:#2D3436;--text-light:#636E72;--text-muted:#94A3B8;--card-bg:#fff;--border:#F1F5F9;--font-display:'Baloo 2',cursive;--font-body:'Nunito',sans-serif;--font-mono:'Fredoka One',cursive;--font-hand:'Patrick Hand',cursive}
    html{font-size:16px;-webkit-text-size-adjust:100%}
    body{font-family:var(--font-body);color:var(--text);min-height:100vh;min-height:100dvh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
    @keyframes floatIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    @keyframes popIn{0%{transform:scale(.8);opacity:0}70%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
    @keyframes starBurst{0%{transform:scale(0) rotate(0);opacity:0}50%{transform:scale(1.3) rotate(180deg);opacity:1}100%{transform:scale(1) rotate(360deg);opacity:1}}
    @keyframes encouragePop{0%{transform:translateY(30px) translateX(-50%) scale(.9);opacity:0}100%{transform:translateY(0) translateX(-50%) scale(1);opacity:1}}
    @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
    @keyframes typewriter{from{width:0}to{width:100%}}
    @keyframes blink{50%{border-color:transparent}}
    .card{background:var(--card-bg);border-radius:20px;padding:24px;box-shadow:0 4px 20px rgba(0,0,0,.06);border:2px solid transparent;transition:all .3s ease}
    .card:hover{box-shadow:0 8px 30px rgba(0,0,0,.1)}
    .card-btn{cursor:pointer;text-align:left;width:100%;border:none;font-family:var(--font-body)}
    .card-btn:hover{transform:translateY(-2px)}
    .btn{padding:10px 20px;border-radius:12px;border:none;font-family:var(--font-body);font-weight:700;font-size:15px;cursor:pointer;transition:all .2s ease;display:inline-flex;align-items:center;justify-content:center;gap:6px;-webkit-tap-highlight-color:transparent}
    .btn:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.15)}
    .btn:active{transform:translateY(0)}
    .btn:disabled{opacity:.5;pointer-events:none}
    .btn-primary{background:linear-gradient(135deg,var(--pink),var(--purple));color:#fff}
    .btn-success{background:linear-gradient(135deg,var(--teal),#44B09E);color:#fff}
    .btn-ghost{background:#F1F5F9;color:var(--text-light)}
    .btn-block{width:100%;padding:14px;font-size:17px}
    .input-spell{padding:10px 16px;border:3px solid #E2E8F0;border-radius:12px;font-size:18px;font-family:var(--font-mono);letter-spacing:3px;text-align:center;outline:none;transition:border-color .3s;width:100%;max-width:300px;-webkit-appearance:none}
    .input-spell:focus{border-color:var(--violet)}
    .input-spell.correct{border-color:var(--teal);background:#F0FFF4}
    .input-spell.incorrect{border-color:var(--red);background:#FFF5F5;animation:shake .4s}
    .word-card{display:inline-block;padding:8px 16px;border-radius:10px;font-weight:700;font-size:18px;letter-spacing:2px;font-family:var(--font-mono)}
    .tag{display:inline-block;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700}
    .syllable-part{background:linear-gradient(135deg,#DDD6FE,#C4B5FD);padding:6px 12px;border-radius:8px;font-weight:700;font-family:var(--font-mono);font-size:16px;color:#5B21B6;display:inline-block}
    .syllable-dot{font-size:20px;color:var(--violet);font-weight:900;margin:0 2px}
    .nav-item{display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:14px;cursor:pointer;transition:all .2s;font-weight:600;font-size:14px;border:none;background:transparent;width:100%;text-align:left;font-family:var(--font-body);color:var(--text-light);-webkit-tap-highlight-color:transparent}
    .nav-item:hover{background:rgba(255,107,157,.1);color:var(--pink)}
    .nav-item.active{background:linear-gradient(135deg,var(--pink),var(--purple));color:#fff;box-shadow:0 4px 15px rgba(255,107,157,.3)}
    .nav-item.active-blue{background:linear-gradient(135deg,var(--sky),var(--cyan));color:#fff;box-shadow:0 4px 15px rgba(56,189,248,.3)}
    .header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;background:#fff;border-bottom:2px solid var(--border);position:sticky;top:0;z-index:100}
    .sidebar{width:270px;background:#fff;border-right:2px solid var(--border);padding:20px 12px;position:fixed;top:0;height:100dvh;z-index:300;transition:left .3s ease;overflow-y:auto}
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:200}
    .main{flex:1;padding:24px 20px;max-width:900px;margin:0 auto;width:100%}
    .progress-track{height:6px;border-radius:3px;background:#E2E8F0;margin-top:16px}
    .progress-fill{height:100%;border-radius:3px;transition:width .4s ease}
    .pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
    .pill{padding:8px 14px;border-radius:12px;border:none;font-family:var(--font-body);font-weight:700;font-size:13px;cursor:pointer;transition:all .2s}
    .toast{position:fixed;bottom:30px;left:50%;z-index:1000;color:#fff;padding:14px 28px;border-radius:16px;font-weight:700;font-size:15px;box-shadow:0 8px 30px rgba(0,0,0,.2);animation:encouragePop .4s ease-out;max-width:90vw;text-align:center;pointer-events:none}
    .tile{width:40px;height:48px;border-radius:10px;display:inline-flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:22px}
    .writing-area{width:100%;min-height:150px;padding:16px;border:3px dashed #C4B5FD;border-radius:16px;font-family:var(--font-hand);font-size:20px;line-height:2;outline:none;resize:vertical;background:repeating-linear-gradient(transparent,transparent 39px,#E8DEF8 39px,#E8DEF8 40px);background-position-y:36px}
    .writing-area:focus{border-color:var(--violet);background-color:#FEFBFF}
    .focus-timer{font-family:var(--font-mono);font-size:48px;color:var(--cyan);text-align:center}
    ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#DDD;border-radius:3px}
    @media(max-width:480px){.card{padding:18px;border-radius:16px}.word-card{font-size:16px;padding:6px 12px}.tile{width:34px;height:42px;font-size:18px}.main{padding:16px 14px}}
    /* Login screen */
    .login-bg{min-height:100vh;min-height:100dvh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#FFF8F0 0%,#FFF0F5 30%,#F0F4FF 60%,#F0FDFA 100%);position:relative;overflow:hidden}
    .login-bg::before{content:'';position:absolute;width:300px;height:300px;background:radial-gradient(circle,rgba(255,107,157,.15),transparent 70%);top:-50px;right:-50px;border-radius:50%}
    .login-bg::after{content:'';position:absolute;width:400px;height:400px;background:radial-gradient(circle,rgba(56,189,248,.1),transparent 70%);bottom:-100px;left:-100px;border-radius:50%}
    .avatar-btn{width:160px;padding:24px 16px;border-radius:24px;border:3px solid transparent;background:#fff;cursor:pointer;transition:all .3s;display:flex;flex-direction:column;align-items:center;gap:10px;box-shadow:0 4px 20px rgba(0,0,0,.06);font-family:var(--font-body)}
    .avatar-btn:hover{transform:translateY(-6px);box-shadow:0 12px 30px rgba(0,0,0,.12)}
    .avatar-circle{width:80px;height:80px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:36px;font-weight:900;color:#fff;font-family:var(--font-display)}
  </style>
</head>
<body>
<div id="app"></div>
<script>
// ═══════════════════════════════════════════════════════════════
//  ENGLISH ADVENTURE — Multi-User Learning Platform
// ═══════════════════════════════════════════════════════════════
const APP=(()=>{

// ── STATE ──
let S={user:null,section:'home',stars:0,completedLessons:[],sidebarOpen:false,encouragement:'',
  // phonics
  phL:0,phPractice:false,phPI:0,phFB:null,phScore:0,phTyped:'',phAnswer:'',
  // syllables
  syL:0,clapMode:false,clapI:0,clapG:'',clapFB:null,
  // rules
  rI:0,rExp:null,
  // word bank
  wT:0,wExp:null,
  // practice
  pTopic:null,pWI:0,pPhase:'look',pTyped:'',pScore:0,pTotal:0,pHint:false,
  // paragraphs
  paraI:0,paraFound:[],paraShow:false,
  // games
  game:null,gI:0,gAns:'',gFB:null,gScrambled:'',gLetters:{},
  // devatv specifics
  dReadI:0,dReadPhase:'read',dReadTimer:0,dReadInterval:null,dReadAnswers:{},dReadFB:null,
  dWritePromptI:0,dWriteText:'',dWriteWC:0,dWriteFB:null,
  dHandI:0,dHandText:'',
  dFocusGame:null,dFocusI:0,dFocusFB:null,dFocusSeq:[],dFocusUserSeq:[],dFocusPhase:'watch',
  dFocusTimer:0,dFocusTimerActive:false,dFocusTimerInterval:null,
  dMemCards:[],dMemFlipped:[],dMemMatched:[],dMemMoves:0,
  // certificate
  certOpen:false,
};

// ── USERS ──
const USERS={
  divisha:{name:'Divisha',class:5,school:'The Khaitan School, Noida',avatar:'D',color1:'#FF6B9D',color2:'#C44DFF',bg:'linear-gradient(135deg,#FFF8F0 0%,#FFF0F5 50%,#F0F4FF 100%)',
    navActive:'active',
    sections:[
      {id:'home',label:'Home',icon:'🏠'},{id:'phonics',label:'Sound Lab',icon:'🔊'},{id:'syllables',label:'Syllable Gym',icon:'👏'},
      {id:'rules',label:'Spelling Rules',icon:'📏'},{id:'wordbank',label:'Word Bank',icon:'🏦'},{id:'practice',label:'Practice Arena',icon:'🎯'},
      {id:'paragraphs',label:'Paragraph Fix',icon:'📝'},{id:'games',label:'Fun Games',icon:'🎮'},{id:'certificate',label:'Certificate',icon:'🏆'},
      {id:'progress',label:'My Progress',icon:'📊'},
    ]},
  devatv:{name:'Devatv',class:2,school:'The Khaitan School, Noida',avatar:'De',color1:'#38BDF8',color2:'#06B6D4',bg:'linear-gradient(135deg,#F0FDFA 0%,#F0F4FF 50%,#FFFBEB 100%)',
    navActive:'active-blue',
    sections:[
      {id:'home',label:'Home',icon:'🏠'},{id:'d-reading',label:'Reading Time',icon:'📖'},{id:'d-writing',label:'Creative Writing',icon:'✍️'},
      {id:'d-handwriting',label:'Handwriting',icon:'🖊️'},{id:'d-focus',label:'Focus Games',icon:'🧠'},{id:'d-games',label:'Fun Games',icon:'🎮'},
      {id:'certificate',label:'Certificate',icon:'🏆'},{id:'progress',label:'My Progress',icon:'📊'},
    ]},
};

// ── PERSISTENCE ──
function save(){try{const k=S.user;localStorage.setItem(`ea_${k}_stars`,S.stars);localStorage.setItem(`ea_${k}_lessons`,JSON.stringify(S.completedLessons));}catch(e){}}
function load(){try{const k=S.user;const s=localStorage.getItem(`ea_${k}_stars`);const l=localStorage.getItem(`ea_${k}_lessons`);S.stars=s?parseInt(s)||0:0;S.completedLessons=l?JSON.parse(l)||[]:[];}catch(e){S.stars=0;S.completedLessons=[];}}

// ── HELPERS ──
const MSGS_D=["You're doing amazing, Divisha! 🌟","Mistakes help us learn! Keep going! 💪","Your brain is building new connections! 🧠","You're becoming a spelling champion! 🏆","Practice makes progress! 🌈"];
const MSGS_V=["Great job, Devatv! You're a superstar! 🌟","Keep reading and imagining! 💫","Your creativity is wonderful! 🎨","Focus power activated! 🧠⚡","You're growing every day! 🌱"];

// ── SOUND (Web Speech API) ──
function speak(text,rate=0.85){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='en-US';u.rate=rate;u.pitch=1.1;u.volume=1;
  window.speechSynthesis.speak(u);
}
function playCorrect(){speak('Correct! Great job!',1);}
function playWrong(){speak('Try again!',1);}
function playWord(w){speak(w,0.75);}

function addStars(n){S.stars+=n;const msgs=S.user==='divisha'?MSGS_D:MSGS_V;S.encouragement=msgs[Math.floor(Math.random()*msgs.length)];save();render();setTimeout(()=>{S.encouragement='';render();},3500);}
function markDone(id){if(!S.completedLessons.includes(id)){S.completedLessons.push(id);addStars(5);save();}}
function scrambleW(w){let a=w.split('');for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}const r=a.join('');return r===w?scrambleW(w):r;}

function h(tag,attrs,...ch){const el=document.createElement(tag);if(attrs)for(const[k,v]of Object.entries(attrs)){if(k==='style'&&typeof v==='object')Object.assign(el.style,v);else if(k.startsWith('on'))el.addEventListener(k.slice(2).toLowerCase(),v);else if(k==='className')el.className=v;else if(k==='innerHTML'){el.innerHTML=v;}else if(k==='disabled'){if(v)el.disabled=true;else el.removeAttribute('disabled');}else if(k==='value'){el.value=v;el.setAttribute('value',v);}else if(k==='placeholder')el.placeholder=v;else if(k==='autofocus'&&v)setTimeout(()=>{el.focus();if(typeof el.selectionStart==='number'){const len=el.value.length;el.selectionStart=len;el.selectionEnd=len;}},60);else el.setAttribute(k,v);}for(const c of ch){if(c==null)continue;if(typeof c==='string'||typeof c==='number')el.appendChild(document.createTextNode(c));else if(Array.isArray(c))c.forEach(x=>{if(x)el.appendChild(x);});else el.appendChild(c);}return el;}

// ═══════════════════════════════════════════════
// ALL DATA
// ═══════════════════════════════════════════════
const PHONICS=[
  {id:'vowel-sounds',title:'Vowel Sounds',icon:'🔤',rule:'Every word needs at least one vowel: A, E, I, O, U. Vowels make SHORT or LONG sounds.',
    examples:[{word:'cat',sound:'short a',hint:'Short sound like in apple'},{word:'cake',sound:'long a',hint:'Says its own name! Silent e helps.'},{word:'bed',sound:'short e',hint:'Short like in egg'},{word:'feet',sound:'long e',hint:'Two e\'s = long ee'},{word:'sit',sound:'short i',hint:'Short like igloo'},{word:'kite',sound:'long i',hint:'Says its name! Silent e.'},{word:'hot',sound:'short o',hint:'Short like octopus'},{word:'bone',sound:'long o',hint:'Says its name! Silent e.'},{word:'cup',sound:'short u',hint:'Short like umbrella'},{word:'cute',sound:'long u',hint:'Says its name! Silent e.'}],
    practice:[{word:'hat',q:'Is the a in HAT short or long?',answer:'short'},{word:'name',q:'Is the a in NAME short or long?',answer:'long'},{word:'pin',q:'Is the i in PIN short or long?',answer:'short'},{word:'ride',q:'Is the i in RIDE short or long?',answer:'long'},{word:'hope',q:'Is the o in HOPE short or long?',answer:'long'},{word:'pot',q:'Is the o in POT short or long?',answer:'short'}]},
  {id:'blends',title:'Consonant Blends',icon:'🤝',rule:'Two or three consonants together where you hear BOTH sounds = a blend.',
    examples:[{word:'black',sound:'bl-',hint:'B+L blend: bl-ack'},{word:'green',sound:'gr-',hint:'G+R blend: gr-een'},{word:'stop',sound:'st-',hint:'S+T: st-op'},{word:'drink',sound:'dr-',hint:'D+R: dr-ink'},{word:'string',sound:'str-',hint:'S+T+R: str-ing'},{word:'splash',sound:'spl-',hint:'S+P+L: spl-ash'},{word:'fast',sound:'-st',hint:'End blend: fa-st'},{word:'jump',sound:'-mp',hint:'End blend: ju-mp'}],
    practice:[{word:'FROG',q:'What blend starts FROG?',answer:'fr'},{word:'CLOCK',q:'What blend starts CLOCK?',answer:'cl'},{word:'TRUST',q:'What blend starts TRUST?',answer:'tr'},{word:'BAND',q:'What blend ends BAND?',answer:'nd'},{word:'DESK',q:'What blend ends DESK?',answer:'sk'}]},
  {id:'digraphs',title:'Digraphs',icon:'👯',rule:'Two letters make ONE new sound (not both sounds). They\'re best friends!',
    examples:[{word:'ship',sound:'sh',hint:'S+H say shhhh'},{word:'chat',sound:'ch',hint:'C+H like chocolate'},{word:'this',sound:'th (soft)',hint:'Tongue between teeth!'},{word:'phone',sound:'ph = f',hint:'P+H sound like f!'},{word:'know',sound:'kn',hint:'K is SILENT!'},{word:'write',sound:'wr',hint:'W is SILENT!'}],
    practice:[{word:'SHAPE',q:'What digraph starts SHAPE?',answer:'sh'},{word:'CHURCH',q:'What digraph starts CHURCH?',answer:'ch'},{word:'PHOTO',q:'What digraph starts PHOTO?',answer:'ph'},{word:'KNIGHT',q:'What silent digraph starts KNIGHT?',answer:'kn'},{word:'WRONG',q:'What silent digraph starts WRONG?',answer:'wr'}]},
];

const RULES=[
  {id:'silent-e',title:'Magic e Rule',icon:'🪄',color:'#FF6B9D',rule:'Silent e at the end makes the vowel say its LONG sound (its own name).',
    pairs:[{w:'cap',wi:'cape',c:'short a → long a'},{w:'kit',wi:'kite',c:'short i → long i'},{w:'hop',wi:'hope',c:'short o → long o'},{w:'cut',wi:'cute',c:'short u → long u'},{w:'pin',wi:'pine',c:'short i → long i'},{w:'tap',wi:'tape',c:'short a → long a'}]},
  {id:'doubling',title:'Doubling Rule (1-1-1)',icon:'✌️',color:'#4ECDC4',rule:'1 syllable, 1 vowel, 1 final consonant → DOUBLE the consonant before -ing/-ed/-er/-est.',
    pairs:[{w:'run',wi:'running',c:'double n'},{w:'hop',wi:'hopping',c:'double p'},{w:'big',wi:'biggest',c:'double g'},{w:'sit',wi:'sitting',c:'double t'},{w:'swim',wi:'swimming',c:'double m'},{w:'hot',wi:'hotter',c:'double t'}]},
  {id:'drop-e',title:'Drop the e',icon:'🗑️',color:'#A78BFA',rule:'Word ends in silent e + suffix starting with VOWEL → drop e. Suffix starts with CONSONANT → keep e.',
    pairs:[{w:'make+ing',wi:'making',c:'Drop e'},{w:'dance+ing',wi:'dancing',c:'Drop e'},{w:'hope+ed',wi:'hoped',c:'Drop e'},{w:'care+ful',wi:'careful',c:'KEEP e'},{w:'excite+ment',wi:'excitement',c:'KEEP e'}]},
  {id:'y-to-i',title:'Y to I Rule',icon:'🔄',color:'#F59E0B',rule:'Consonant + Y → change Y to I before suffix (except -ing). Vowel + Y → just add suffix.',
    pairs:[{w:'happy+ness',wi:'happiness',c:'y→i'},{w:'carry+ed',wi:'carried',c:'y→i'},{w:'easy+ly',wi:'easily',c:'y→i'},{w:'play+ed',wi:'played',c:'vowel+y: keep y'},{w:'carry+ing',wi:'carrying',c:'keep y with -ing'}]},
  {id:'i-before-e',title:'I Before E',icon:'🅸🅴',color:'#EC4899',rule:'"I before E, except after C, or when it sounds like A."',
    pairs:[{w:'i before e',wi:'believe',c:'bel-IE-ve'},{w:'i before e',wi:'friend',c:'fr-IE-nd'},{w:'after c',wi:'receive',c:'rec-EI-ve'},{w:'after c',wi:'ceiling',c:'c-EI-ling'},{w:'sounds like A',wi:'weigh',c:'w-EI-gh'},{w:'sounds like A',wi:'neighbour',c:'n-EI-ghbour'}]},
  {id:'plurals',title:'Making Plurals',icon:'👥',color:'#06B6D4',rule:'Most: +s. Ends s/sh/ch/x/z: +es. Consonant+y: y→i+es. f/fe: →ves. Some irregular!',
    pairs:[{w:'most',wi:'cats, dogs, books',c:'Just add -s'},{w:'s/sh/ch/x/z',wi:'buses, dishes, boxes',c:'Add -es'},{w:'consonant+y',wi:'babies, stories',c:'y→i, +es'},{w:'f/fe',wi:'knives, wolves',c:'f→ves'},{w:'irregular',wi:'children, mice, teeth',c:'Memorize!'},{w:'same',wi:'sheep, fish, deer',c:'Stay same!'}]},
  {id:'prefixes',title:'Prefixes',icon:'⬅️',color:'#8B5CF6',rule:'Added to BEGINNING. Original word spelling does NOT change!',
    pairs:[{w:'un+happy',wi:'unhappy',c:'un-=not'},{w:'re+write',wi:'rewrite',c:'re-=again'},{w:'dis+agree',wi:'disagree',c:'dis-=opposite'},{w:'mis+spell',wi:'misspell',c:'mis-=wrongly (2 s\'s!)'},{w:'pre+view',wi:'preview',c:'pre-=before'},{w:'im+possible',wi:'impossible',c:'im-=not'}]},
  {id:'suffixes',title:'Suffixes',icon:'➡️',color:'#10B981',rule:'Added to END. Sometimes base word changes!',
    pairs:[{w:'teach+er',wi:'teacher',c:'-er=person who'},{w:'care+less',wi:'careless',c:'-less=without'},{w:'wonder+ful',wi:'wonderful',c:'-ful=full of'},{w:'kind+ness',wi:'kindness',c:'-ness=state of'},{w:'quick+ly',wi:'quickly',c:'-ly=in a way'}]},
];

const SYLLABLE_LESSONS=[
  {id:'what',title:'What Are Syllables?',icon:'👏',rule:'A syllable is a beat. Every syllable has ONE vowel sound. Put hand under chin — every chin drop = 1 syllable!',

// RENDER ENGINE
// ═══════════════════════════════════════════════
function render(){
  const app=document.getElementById('app');
  app.innerHTML='';
  if(!S.user){app.appendChild(renderLogin());return;}

  const u=USERS[S.user];
  document.body.style.background=u.bg;

  // Toast
  if(S.encouragement){
    app.appendChild(h('div',{className:'toast',style:{background:`linear-gradient(135deg,${u.color1},${u.color2})`}},S.encouragement));
  }

  app.appendChild(renderHeader(u));
  const body=h('div',{style:{display:'flex',minHeight:'calc(100dvh - 56px)'}});
  if(S.sidebarOpen) body.appendChild(h('div',{className:'overlay',onClick:()=>{S.sidebarOpen=false;render();}}));
  body.appendChild(renderSidebar(u));
  const main=h('div',{className:'main',style:{animation:'floatIn .5s ease-out'}});

  // Route
  const sec=S.section;
  if(sec==='home') main.appendChild(S.user==='divisha'?renderHomeD():renderHomeV());
  else if(sec==='phonics') main.appendChild(renderPhonics());
  else if(sec==='syllables') main.appendChild(renderSyllables());
  else if(sec==='rules') main.appendChild(renderRules());
  else if(sec==='wordbank') main.appendChild(renderWordBank());
  else if(sec==='practice') main.appendChild(renderPractice());
  else if(sec==='paragraphs') main.appendChild(renderParagraphs());
  else if(sec==='games') main.appendChild(S.user==='divisha'?renderGamesD():renderGamesV());
  else if(sec==='d-reading') main.appendChild(renderReading());
  else if(sec==='d-writing') main.appendChild(renderWriting());
  else if(sec==='d-handwriting') main.appendChild(renderHandwriting());
  else if(sec==='d-focus') main.appendChild(renderFocus());
  else if(sec==='d-games') main.appendChild(renderGamesV());
  else if(sec==='certificate') main.appendChild(renderCertificate());
  else if(sec==='progress') main.appendChild(renderProgress());

  body.appendChild(main);
  app.appendChild(body);
}

// ── SIDEBAR ──
function renderSidebar(u){
  const nav=h('nav',{className:'sidebar',style:{left:S.sidebarOpen?'0':'-290px'}});
  const brand=h('div',{style:{marginBottom:24,padding:'0 8px'}});
  brand.appendChild(h('div',{style:{fontFamily:'var(--font-display)',fontWeight:800,fontSize:20,color:u.color1}},'📚 '+u.name+'\'s'));
  brand.appendChild(h('div',{style:{fontFamily:'var(--font-display)',fontWeight:800,fontSize:16,color:u.color2}},'English Adventure'));
  brand.appendChild(h('div',{style:{fontSize:12,color:'var(--text-muted)',marginTop:4}},`Class ${u.class} • ${u.school}`));
  nav.appendChild(brand);
  u.sections.forEach(s=>{
    const isActive=S.section===s.id;
    const btn=h('button',{className:'nav-item'+(isActive?' '+u.navActive:''),onClick:()=>{S.section=s.id;S.sidebarOpen=false;render();}});
    btn.appendChild(h('span',{style:{fontSize:20}},s.icon));
    btn.appendChild(h('span',{},s.label));
    if(S.completedLessons.includes(s.id)) btn.appendChild(h('span',{style:{marginLeft:'auto'}},'✅'));
    nav.appendChild(btn);
  });
  return nav;
}

  const w=h('div',{});w.appendChild(h('h2',{style:{fontFamily:'var(--font-display)',fontSize:26,color:'var(--amber)',marginBottom:4}},'🧠 Focus Games'));
  w.appendChild(h('p',{style:{color:'var(--text-light)',marginBottom:20}},'Train your concentration superpowers!'));

  if(!S.dFocusGame){
    const grid=h('div',{style:{display:'grid',gap:14}});
    [{id:'sequence',icon:'🔢',t:'Remember the Sequence',d:'Watch the pattern, repeat it!',c:'var(--amber)'},
     {id:'memory',icon:'🃏',t:'Memory Match',d:'Find matching pairs of cards!',c:'var(--rose)'},
     {id:'timer',icon:'⏱️',t:'Focus Timer',d:'How long can you focus? Challenge yourself!',c:'var(--cyan)'}].forEach(g=>{
      grid.appendChild(h('button',{className:'card card-btn',style:{fontFamily:'var(--font-body)'},onClick:()=>{S.dFocusGame=g.id;initFocusGame(g.id);render();}},
        h('div',{style:{fontSize:36,marginBottom:8}},g.icon),h('div',{style:{fontWeight:800,fontSize:18,color:g.c}},g.t),h('div',{style:{fontSize:13,color:'#6B7280',marginTop:4}},g.d)));});
    w.appendChild(grid);return w;
  }

function initFocusGame(id){
  if(id==='sequence'){S.dFocusSeq=[];S.dFocusUserSeq=[];S.dFocusPhase='watch';S.dFocusFB=null;S.dFocusI=0;addToSequence();}
  if(id==='memory'){
    const pairs=[...MEMORY_EMOJIS,...MEMORY_EMOJIS];
    for(let i=pairs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pairs[i],pairs[j]]=[pairs[j],pairs[i]];}
    S.dMemCards=pairs;S.dMemFlipped=[];S.dMemMatched=[];S.dMemMoves=0;
  }
  if(id==='timer'){S.dFocusTimer=0;S.dFocusTimerActive=false;}
}

function addToSequence(){
  const colors=['#FF6B9D','#4ECDC4','#F59E0B','#A78BFA','#06B6D4','#EF4444','#10B981','#EC4899'];
  S.dFocusSeq.push(Math.floor(Math.random()*colors.length));
  S.dFocusPhase='watch';S.dFocusUserSeq=[];S.dFocusFB=null;S.dFocusI=0;
  render();
  // Flash each colour in the sequence one by one
  S.dFocusSeq.forEach((colorIdx,step)=>{
    setTimeout(()=>{
      S.dFocusI=colorIdx;
      const btns=document.querySelectorAll('.seq-btn');
      if(btns[colorIdx]){btns[colorIdx].style.opacity='1';btns[colorIdx].style.transform='scale(1.2)';btns[colorIdx].style.boxShadow='0 0 20px rgba(0,0,0,.4)';}
      setTimeout(()=>{
        if(btns[colorIdx]){btns[colorIdx].style.opacity='0.4';btns[colorIdx].style.transform='scale(1)';btns[colorIdx].style.boxShadow='none';}
        if(step===S.dFocusSeq.length-1){S.dFocusPhase='input';render();}
      },500);
    },step*800+300);
  });
}

function renderSequenceGame(){
  const colors=['#FF6B9D','#4ECDC4','#F59E0B','#A78BFA','#06B6D4','#EF4444','#10B981','#EC4899'];
  const card=h('div',{className:'card',style:{textAlign:'center',border:'2px solid var(--amber)'}});
  card.appendChild(h('h3',{style:{fontFamily:'var(--font-display)',fontSize:22,color:'var(--amber)',marginBottom:4}},'🔢 Remember the Sequence!'));
  card.appendChild(h('div',{style:{fontSize:13,color:'#6B7280',marginBottom:16}},`Level: ${S.dFocusSeq.length} • ${S.dFocusPhase==='watch'?'WATCH carefully!':'Now tap the colors in order!'}`));

  const grid=h('div',{style:{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10,maxWidth:300,margin:'0 auto',marginBottom:16}});
  colors.forEach((col,i)=>{
    grid.appendChild(h('button',{className:'seq-btn',style:{width:'100%',aspectRatio:'1',borderRadius:14,background:col,border:'none',cursor:S.dFocusPhase==='input'?'pointer':'not-allowed',opacity:'0.4',transition:'all .2s'},
      disabled:S.dFocusPhase!=='input'||!!S.dFocusFB,
      onClick:()=>{
        S.dFocusUserSeq.push(i);
        const idx=S.dFocusUserSeq.length-1;
        if(S.dFocusUserSeq[idx]!==S.dFocusSeq[idx]){S.dFocusFB='wrong';playWrong();render();return;}
        if(S.dFocusUserSeq.length===S.dFocusSeq.length){S.dFocusFB='correct';playCorrect();addStars(S.dFocusSeq.length);render();}else{render();}
      }}));
  });
  card.appendChild(grid);

  if(S.dFocusFB==='correct'){card.appendChild(h('div',{style:{animation:'popIn .3s ease'}},
    h('div',{style:{fontSize:18,fontWeight:800,color:'#059669',marginBottom:8}},`🎉 Level ${S.dFocusSeq.length} complete! +${S.dFocusSeq.length} Stars!`),
    h('button',{className:'btn btn-success',onClick:()=>{addToSequence();render();}},'Next Level →')));}
  if(S.dFocusFB==='wrong'){card.appendChild(h('div',{style:{animation:'popIn .3s ease'}},
    h('div',{style:{fontSize:18,fontWeight:800,color:'#DC2626',marginBottom:8}},`Game over at level ${S.dFocusSeq.length}!`),
    h('button',{className:'btn btn-primary',onClick:()=>{S.dFocusSeq=[];S.dFocusUserSeq=[];S.dFocusFB=null;addToSequence();render();}},'Try Again!')));}

  // Progress
  if(S.dFocusPhase==='input'&&!S.dFocusFB){
    const tr=h('div',{className:'progress-track'});tr.appendChild(h('div',{className:'progress-fill',style:{background:'linear-gradient(90deg,var(--amber),var(--orange))',width:`${(S.dFocusUserSeq.length/S.dFocusSeq.length)*100}%`}}));card.appendChild(tr);}
  return card;
}

function renderMemoryGame(){
  const card=h('div',{className:'card',style:{textAlign:'center',border:'2px solid var(--rose)'}});
  card.appendChild(h('h3',{style:{fontFamily:'var(--font-display)',fontSize:22,color:'var(--rose)',marginBottom:4}},'🃏 Memory Match'));
  card.appendChild(h('div',{style:{fontSize:13,color:'#6B7280',marginBottom:16}},`Moves: ${S.dMemMoves} • Pairs: ${S.dMemMatched.length/2}/${MEMORY_EMOJIS.length}`));

  const grid=h('div',{style:{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:8,maxWidth:320,margin:'0 auto'}});
  S.dMemCards.forEach((emoji,i)=>{
    const isFlipped=S.dMemFlipped.includes(i)||S.dMemMatched.includes(i);
    grid.appendChild(h('button',{style:{width:'100%',aspectRatio:'1',borderRadius:12,border:'none',fontSize:28,cursor:isFlipped?'default':'pointer',
      background:isFlipped?'linear-gradient(135deg,#FFF0F5,#F5F0FF)':'linear-gradient(135deg,var(--rose),var(--purple))',
      transition:'all .3s',transform:isFlipped?'rotateY(0)':'rotateY(0)',boxShadow:'0 2px 10px rgba(0,0,0,.08)'},
      disabled:isFlipped||S.dMemFlipped.length>=2,
      onClick:()=>{
        S.dMemFlipped.push(i);
        if(S.dMemFlipped.length===2){
          S.dMemMoves++;
          const[a,b]=S.dMemFlipped;
          if(S.dMemCards[a]===S.dMemCards[b]){S.dMemMatched.push(a,b);S.dMemFlipped=[];addStars(1);
            if(S.dMemMatched.length===S.dMemCards.length){markDone('d-focus');}
          }else{setTimeout(()=>{S.dMemFlipped=[];render();},800);}
        }
        render();
      }},isFlipped?emoji:'❓'));
  });
  card.appendChild(grid);

  if(S.dMemMatched.length===S.dMemCards.length){
    card.appendChild(h('div',{style:{marginTop:16,animation:'popIn .3s ease'}},
      h('div',{style:{fontSize:24,fontWeight:800,color:'#059669'}},'🏆 All Matched!'),
      h('div',{style:{fontSize:14,color:'#6B7280',marginTop:4}},`Completed in ${S.dMemMoves} moves!`),
      h('button',{className:'btn btn-primary',style:{marginTop:12},onClick:()=>{initFocusGame('memory');render();}},'Play Again!')));}
  return card;
}

function renderFocusTimer(){
  const card=h('div',{className:'card',style:{textAlign:'center',border:'2px solid var(--cyan)'}});
  card.appendChild(h('h3',{style:{fontFamily:'var(--font-display)',fontSize:22,color:'var(--cyan)',marginBottom:8}},'⏱️ Focus Timer Challenge'));

    [5,10,15,20].forEach(min=>{

}

  cert.appendChild(h('div',{style:{fontSize:14,color:'var(--text-muted)',marginTop:16}},`Date: ${new Date().toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'})}`));
  cert.appendChild(h('div',{style:{marginTop:20,display:'flex',justifyContent:'center',gap:40}},
    h('div',{},h('div',{style:{borderTop:'2px solid #CBD5E0',paddingTop:8,fontSize:13,color:'var(--text-muted)'}},'Parent/Teacher'),h('div',{style:{fontSize:12,color:'var(--text-muted)'}},'Signature')),
    h('div',{},h('div',{style:{borderTop:'2px solid #CBD5E0',paddingTop:8,fontSize:13,color:'var(--text-muted)'}},u.name),h('div',{style:{fontSize:12,color:'var(--text-muted)'}},'Student'))
  ));

  w.appendChild(cert);

  // Print button
  w.appendChild(h('div',{style:{textAlign:'center'}},
    h('button',{className:'btn',style:{background:'linear-gradient(135deg,var(--amber),var(--orange))',color:'#fff',padding:'14px 40px',fontSize:18},onClick:printCertificate},'🖨️ Print Certificate'),
    h('div',{style:{fontSize:13,color:'var(--text-muted)',marginTop:8}},'Opens your print dialog — print or save as PDF!')
  ));
  return w;
}

function printCertificate(){
  const u=USERS[S.user];const tl=u.sections.length-2;const pct=Math.round((S.completedLessons.length/tl)*100);
  let badgesHTML='';
  if(S.stars>=5) badgesHTML+='<span style="background:#FEF3C7;color:#92400E;padding:4px 12px;border-radius:20px;font-size:13px;font-weight:700;margin:4px">🌱 First Steps</span>';
  if(S.stars>=20) badgesHTML+='<span style="background:#DBEAFE;color:#1E40AF;padding:4px 12px;border-radius:20px;font-size:13px;font-weight:700;margin:4px">⚔️ Word Warrior</span>';
  if(S.stars>=50) badgesHTML+='<span style="background:#FFF0F5;color:#BE185D;padding:4px 12px;border-radius:20px;font-size:13px;font-weight:700;margin:4px">🌟 Spelling Star</span>';
  if(S.stars>=100) badgesHTML+='<span style="background:#EDE9FE;color:#5B21B6;padding:4px 12px;border-radius:20px;font-size:13px;font-weight:700;margin:4px">🧠 Genius</span>';
  if(S.completedLessons.length>=3) badgesHTML+='<span style="background:#D1FAE5;color:#065F46;padding:4px 12px;border-radius:20px;font-size:13px;font-weight:700;margin:4px">📖 Dedicated Learner</span>';

  const printWindow=window.open('','_blank');
  printWindow.document.write(`<!DOCTYPE html><html><head><title>Certificate - ${u.name}</title>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>@page{size:landscape;margin:0}body{margin:0;padding:40px;font-family:'Nunito',sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;background:#fff}
  .cert{border:8px double #F59E0B;border-radius:20px;padding:50px 60px;text-align:center;max-width:800px;width:100%;position:relative}
  .star{font-size:56px;margin-bottom:12px}.title{font-family:'Baloo 2',cursive;font-size:16px;color:#F59E0B;letter-spacing:4px;text-transform:uppercase;margin-bottom:8px}
  .name{font-family:'Baloo 2',cursive;font-size:40px;color:${u.color1};margin-bottom:4px}.school{font-size:16px;color:#636E72;margin-bottom:20px}
  hr{border:none;border-top:2px solid #FDE68A;margin:20px 60px}.body{font-size:17px;color:#2D3436;line-height:1.8;margin-bottom:20px}
  .badges{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:20px}.date{font-size:14px;color:#94A3B8;margin-top:20px}
  .sigs{display:flex;justify-content:center;gap:60px;margin-top:30px}.sig{text-align:center}.sig-line{border-top:2px solid #CBD5E0;padding-top:8px;font-size:14px;color:#94A3B8;min-width:150px}.sig-label{font-size:12px;color:#94A3B8}
  .corner{position:absolute;width:60px;height:60px;background:linear-gradient(135deg,#FDE68A,#F59E0B);opacity:0.3}
  </style></head><body>
  <div class="cert">
  <div class="corner" style="top:0;left:0;border-radius:20px 0 0 0"></div><div class="corner" style="top:0;right:0;border-radius:0 20px 0 0"></div>
  <div class="corner" style="bottom:0;left:0;border-radius:0 0 0 20px"></div><div class="corner" style="bottom:0;right:0;border-radius:0 0 20px 0"></div>
  <div class="star">🏆</div>
  <div class="title">Certificate of Achievement</div>
  <div class="name">${u.name}</div>
  <div class="school">Class ${u.class} • ${u.school}</div>
  <hr>
  <div class="body">Has earned ⭐ ${S.stars} stars and completed ${S.completedLessons.length} out of ${tl} learning activities (${pct}%) in the English Adventure program.</div>
  <div class="badges">${badgesHTML}</div>
  <div class="date">Date: ${new Date().toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'})}</div>
  <div class="sigs"><div class="sig"><div class="sig-line">Parent / Teacher</div><div class="sig-label">Signature</div></div><div class="sig"><div class="sig-line">${u.name}</div><div class="sig-label">Student</div></div></div>
  </div>
  <script>window.onload=function(){window.print();}<\/script></body></html>`);
  printWindow.document.close();
}

// ═══════════════════════════════════════════════
// PROGRESS
// ═══════════════════════════════════════════════
function renderProgress(){
  const w=h('div',{});const u=USERS[S.user];const tl=u.sections.length-2;const pct=Math.round((S.completedLessons.length/tl)*100);
  w.appendChild(h('h2',{style:{fontFamily:'var(--font-display)',fontSize:26,color:'#8B5CF6',marginBottom:4}},'📊 My Progress'));

  const hero=h('div',{className:'card',style:{background:`linear-gradient(135deg,${u.color1},${u.color2})`,color:'#fff',marginBottom:20,textAlign:'center'}});
  hero.appendChild(h('div',{style:{fontSize:48,fontWeight:900,fontFamily:'var(--font-display)'}},'⭐ '+S.stars));
  hero.appendChild(h('div',{style:{fontSize:16,opacity:.9}},'Stars Earned'));
  const tr=h('div',{style:{marginTop:16,height:12,borderRadius:6,background:'rgba(255,255,255,.2)'}});
  tr.appendChild(h('div',{style:{height:'100%',borderRadius:6,background:'linear-gradient(90deg,#FDE68A,var(--amber))',width:`${pct}%`,transition:'width .5s'}}));
  hero.appendChild(tr);hero.appendChild(h('div',{style:{marginTop:8,fontSize:14,opacity:.9}},`${S.completedLessons.length}/${tl} sections (${pct}%)`));
  w.appendChild(hero);

  w.appendChild(h('h3',{style:{fontFamily:'var(--font-display)',fontSize:20,color:'#374151',marginBottom:12}},'🏅 Badges'));
  const badges=[{n:'First Steps',i:'🌱',need:5,t:'s'},{n:'Word Warrior',i:'⚔️',need:20,t:'s'},{n:'Spelling Star',i:'🌟',need:50,t:'s'},{n:'Genius',i:'🧠',need:100,t:'s'},{n:'Champion',i:'🏆',need:200,t:'s'},{n:'Learner',i:'📖',need:3,t:'l'},{n:'Halfway Hero',i:'🦸',need:4,t:'l'},{n:'Graduate',i:'🎓',need:Math.max(5,tl),t:'l'}];
  const bg=h('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(120px,1fr))',gap:10}});
  badges.forEach(b=>{const earned=b.t==='s'?S.stars>=b.need:S.completedLessons.length>=b.need;
    bg.appendChild(h('div',{className:'card',style:{textAlign:'center',opacity:earned?1:.4,filter:earned?'none':'grayscale(1)',padding:14}},
      h('div',{style:{fontSize:32,marginBottom:4}},b.i),h('div',{style:{fontSize:12,fontWeight:800,color:earned?'#374151':'var(--text-muted)'}},b.n),
      h('div',{style:{fontSize:11,color:'var(--text-muted)'}},b.t==='s'?`${b.need} stars`:`${b.need} lessons`)));});
  w.appendChild(bg);

  // Generate cert button
  w.appendChild(h('button',{className:'btn btn-block',style:{marginTop:24,background:'linear-gradient(135deg,var(--amber),var(--orange))',color:'#fff',fontSize:18},
    onClick:()=>{S.section='certificate';render();}},'🏆 View & Print Certificate'));
  return w;
}

// ── INIT ──
function init(){render();}
return{init};
})();

document.addEventListener('DOMContentLoaded',APP.init);
</script>
</body>
</html>
